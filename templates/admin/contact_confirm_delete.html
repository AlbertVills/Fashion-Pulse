{% extends 'base.html' %}

{% block title %}Delete Contact Message | FashionPulse{% endblock %}

{% block content %}
<section class="hero">
    <p class="eyebrow">Admin</p>
    <h1>Delete Contact Message</h1>
    <p>Are you sure you want to delete <strong>{{ contact.subject }}</strong> from {{ contact.name }}?</p>
</section>

<section class="card admin-form-card">
    <form method="post" class="admin-links-row">
        {% csrf_token %}
        <button type="submit" class="btn-primary">Delete</button>
        <a class="file-remove-btn" href="{% url 'admin-contacts-list' %}">Cancel</a>
    </form>
</section>
{% endblock %}
