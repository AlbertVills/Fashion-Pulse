{% extends 'base.html' %}

{% block title %}{{ form_title }} | FashionPulse{% endblock %}

{% block content %}
<section class="hero">
    <p class="eyebrow">Admin</p>
    <h1>{{ form_title }}</h1>
</section>

<section class="card admin-form-card">
    <form method="post" class="admin-form-grid">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-row">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <small class="form-error">{{ field.errors|striptags }}</small>
                {% endif %}
            </div>
        {% endfor %}
        <div class="admin-links-row">
            <button type="submit" class="btn-primary">{{ submit_label }}</button>
            <a class="file-remove-btn" href="{% url 'admin-contacts-list' %}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
