{% extends 'base.html' %}

{% block title %}Email Sent | FashionPulse{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="card auth-card">
        <h1>Check Your Email</h1>
        <p class="meta">If an account exists with that email address, we've sent a 6-digit password reset code. Please check your inbox and spam folder.</p>
        <p><a href="{% url 'password_reset_code_confirm' %}{% if email %}?email={{ email|urlencode }}{% endif %}" class="btn-primary" style="display:inline-block;text-decoration:none;">Enter Reset Code</a></p>
        <p><a href="{% url 'login' %}">Back to Login</a></p>
    </div>
</section>
{% endblock %}
