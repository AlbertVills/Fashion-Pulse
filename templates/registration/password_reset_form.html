{% extends 'base.html' %}

{% block title %}Reset Password | FashionPulse{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="card auth-card">
        <h1>Reset Password</h1>
        <p class="meta">Enter your email address and we'll send you a 6-digit code to reset your password.</p>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Send Reset Code</button>
        </form>
        <p>Remember your password? <a href="{% url 'login' %}">Login</a></p>
    </div>
</section>
{% endblock %}
