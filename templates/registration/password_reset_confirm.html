{% extends 'base.html' %}

{% block title %}Set New Password | FashionPulse{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="card auth-card">
        <h1>Enter Reset Code</h1>
        <p class="meta">Enter your email, 6-digit reset code, and new password.</p>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Reset Password</button>
        </form>
        <p><a href="{% url 'password_reset' %}">Request New Code</a></p>
    </div>
</section>
{% endblock %}
